<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>やさしいいばしょ はっけんカード</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --yellow:#f7c12e;--ink:#36302a;--ink-soft:#5d544b;
    --orange:#e8830c;--cream:#fdf6e6;--line:#2b2622;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    font-family:"Zen Maru Gothic",system-ui,sans-serif;color:var(--ink);
    background:
      radial-gradient(1200px 600px at 50% -10%, #fff5dc 0%, rgba(255,245,220,0) 60%),
      radial-gradient(900px 700px at 110% 110%, #fce9c0 0%, rgba(252,233,192,0) 55%),
      var(--cream);
    min-height:100dvh;display:flex;flex-direction:column;align-items:center;
    padding:max(18px,env(safe-area-inset-top)) 18px max(24px,env(safe-area-inset-bottom));
    overflow-x:hidden;
  }
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:radial-gradient(rgba(232,131,12,.06) 1.4px, transparent 1.6px);
    background-size:22px 22px;mask-image:linear-gradient(180deg,#000,transparent 80%);
  }
  header{position:relative;z-index:1;text-align:center;margin:6px 0 4px;}
  .eyebrow{font-size:13px;letter-spacing:.28em;color:var(--orange);font-weight:700;margin-bottom:6px;padding-left:.28em;}
  h1{font-size:clamp(22px,6.4vw,30px);font-weight:900;margin:0;letter-spacing:.02em;line-height:1.25;}
  h1 .sub{display:block;font-size:.62em;color:var(--ink-soft);font-weight:700;margin-top:4px;letter-spacing:.06em;}

  .stage{position:relative;z-index:1;flex:1;display:flex;align-items:center;justify-content:center;width:100%;overflow:hidden;}

  .scene{
    perspective:1600px;width:min(73vw,298px);
    transition:transform .42s cubic-bezier(.4,0,.2,1),opacity .42s ease;
  }
  .scene.exit{transform:translateX(-170%) rotate(-9deg);opacity:0;}
  .scene.enter{transform:translateX(170%) rotate(9deg);opacity:0;}

  .card{
    position:relative;width:100%;aspect-ratio:5/7;transform-style:preserve-3d;cursor:pointer;
    transition:transform .6s cubic-bezier(.3,.9,.25,1);will-change:transform;
  }
  .card.flipped{transform:rotateY(180deg);}
  .face{
    position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
    border-radius:30px;border:3px solid var(--line);overflow:hidden;display:flex;flex-direction:column;
  }
  .back{background:var(--yellow);align-items:center;justify-content:space-between;padding:11% 8% 9%;text-align:center;}
  .back .t{font-weight:900;color:var(--ink);font-size:clamp(17px,5.6vw,23px);line-height:1.2;}
  .back .dino{width:78%;max-width:230px;}
  .back .b{font-weight:900;color:var(--ink);font-size:clamp(16px,5.4vw,22px);letter-spacing:.02em;}

  .front{transform:rotateY(180deg);background:#fff;align-items:center;justify-content:flex-start;padding:7% 8% 6%;text-align:center;}
  .front .pic{width:100%;flex:0 0 auto;height:42%;display:flex;align-items:center;justify-content:center;margin-top:15%;}
  .front .pic img{max-width:92%;max-height:100%;object-fit:contain;}
  .front .q{flex:1;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--ink);line-height:1.62;font-size:clamp(15px,4.5vw,19px);padding:2% 1% 0;word-break:auto-phrase;}
  .front .no{position:absolute;top:14px;right:18px;font-size:12px;font-weight:700;color:var(--orange);letter-spacing:.06em;opacity:.85;}

  .hint{position:relative;z-index:1;text-align:center;color:var(--ink-soft);font-size:13px;margin-top:14px;min-height:18px;font-weight:500;letter-spacing:.04em;}

  .controls{position:relative;z-index:1;display:flex;gap:12px;align-items:center;margin-top:14px;}
  button{font-family:inherit;cursor:pointer;border:3px solid var(--line);border-radius:999px;}
  .draw{background:var(--orange);color:#fff;font-weight:900;font-size:17px;padding:14px 30px;letter-spacing:.04em;box-shadow:0 6px 0 #b9650a;transition:transform .08s,box-shadow .08s;}
  .draw:active{transform:translateY(4px);box-shadow:0 2px 0 #b9650a;}
  .draw:disabled{opacity:.55;}
  .ghost{background:#fff;color:var(--ink);font-weight:700;font-size:15px;padding:13px 18px;box-shadow:0 5px 0 rgba(43,38,34,.14);transition:transform .08s,box-shadow .08s;}
  .ghost:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(43,38,34,.14);}

  .progress{position:relative;z-index:1;font-size:12.5px;color:var(--ink-soft);margin-top:13px;font-weight:600;letter-spacing:.05em;}

  @media (prefers-reduced-motion: reduce){.card,.scene{transition:none}}
</style>
</head>
<body>
  <header>
    <div class="eyebrow">YASASHII IBASHO</div>
    <h1>やさしいいばしょ<span class="sub">はっけんカード</span></h1>
  </header>

  <div class="stage">
    <div class="scene" id="scene">
      <div class="card" id="card">
        <div class="face back">
          <div class="t">やさしいいばしょ</div>
          <img class="dino" id="backImg" alt="">
          <div class="b">はっけんカード</div>
        </div>
        <div class="face front">
          <div class="no" id="cardNo"></div>
          <div class="pic"><img id="frontImg" alt=""></div>
          <div class="q" id="question"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="hint" id="hint">カードをタップしてめくってみてね</div>

  <div class="controls">
    <button class="draw" id="drawBtn">カードをひく</button>
    <button class="ghost" id="resetBtn">はじめから</button>
  </div>
  <div class="progress" id="progress"></div>

const scene=document.getElementById('scene');
const card=document.getElementById('card');
const frontImg=document.getElementById('frontImg');
const question=document.getElementById('question');
const cardNo=document.getElementById('cardNo');
const hint=document.getElementById('hint');
const drawBtn=document.getElementById('drawBtn');
const resetBtn=document.getElementById('resetBtn');
const progress=document.getElementById('progress');
document.getElementById('backImg').src=DATA.back;

let deck=[],flipped=false,current=-1,drawn=0,busy=false;

const shuffle=a=>{for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;};
function newDeck(){deck=shuffle([...Array(DATA.cards.length).keys()]);drawn=0;}
function updateProgress(){progress.textContent=`${drawn} / ${DATA.cards.length} まい`;}
function pick(){if(deck.length===0){newDeck();hint.textContent='ぜんぶめくれたね。もう一周しよう';}return deck.pop();}
function setFront(i){const c=DATA.cards[i];frontImg.src=c.img;question.textContent=c.q;cardNo.textContent=`#${String(i+1).padStart(2,'0')}`;}
function flipToBackInstant(){card.style.transition='none';card.classList.remove('flipped');flipped=false;void card.offsetWidth;card.style.transition='';}

// Draw next: slide current out, slide a fresh BACK-facing card in. Tap to reveal.
function dealNext(){
  if(busy)return; busy=true; drawBtn.disabled=true;
  const i=pick();
  const finishIn=()=>{
    flipToBackInstant();
    setFront(i);                      // preload front behind the back
    scene.style.transition='none';
    scene.classList.remove('exit');
    scene.classList.add('enter');
    void scene.offsetWidth;
    scene.style.transition='';
    scene.classList.remove('enter');  // slide in to center
    current=i; drawn++; updateProgress();
    hint.textContent='カードをタップ';
    drawBtn.textContent='つぎのカード';
    setTimeout(()=>{busy=false;drawBtn.disabled=false;},430);
  };
  if(current<0){ finishIn(); }       // first card: just slide in
  else{
    scene.classList.add('exit');
    setTimeout(finishIn,430);
  }
}

function toggleFlip(){
  if(busy)return;
  if(current<0){ // tapped before drawing: deal then reveal
    const i=pick(); setFront(i); current=i; drawn++; updateProgress();
    drawBtn.textContent='つぎのカード';
    requestAnimationFrame(()=>{card.classList.add('flipped');flipped=true;hint.textContent='';});
    return;
  }
  flipped=!flipped;
  card.classList.toggle('flipped',flipped);
  hint.textContent=flipped?'':'カードをタップ';
}

card.addEventListener('click',toggleFlip);
drawBtn.addEventListener('click',e=>{e.stopPropagation();dealNext();});
resetBtn.addEventListener('click',e=>{
  e.stopPropagation();
  card.classList.remove('flipped');flipped=false;current=-1;
  newDeck();updateProgress();
  drawBtn.textContent='カードをひく';
  hint.textContent='カードをタップしてめくってみてね';
});

newDeck();updateProgress();
</script>
